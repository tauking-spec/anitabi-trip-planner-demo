<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Anitabi 巡礼路线 Demo</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <aside class="panel" aria-label="路线规划控制面板">
          <div class="brand">
            <span class="brand-mark">巡</span>
            <div>
              <h1>Anitabi 巡礼路线</h1>
              <p>基于公开 API 的非商业路线规划原型</p>
            </div>
          </div>

          <div class="notice">
            数据来自 Anitabi 开放 API，遵循 CC BY-NC-SA 4.0。位置只在当前浏览器中计算。
          </div>

          <fieldset class="control-group">
            <legend>当前位置</legend>
            <div class="row">
              <button id="locateBtn" type="button">使用浏览器定位</button>
              <button id="demoLocationBtn" type="button" class="secondary">宇治示例</button>
            </div>
            <div class="search-box">
              <label>
                地点搜索
                <input id="locationSearchInput" type="search" placeholder="输入城市、车站或景点，如 京都站" />
              </label>
              <button id="locationSearchBtn" type="button" class="secondary">搜索</button>
            </div>
            <div id="locationSearchResults" class="location-results"></div>
            <div class="grid-2">
              <label>
                纬度
                <input id="latInput" type="number" step="0.000001" value="34.8909" />
              </label>
              <label>
                经度
                <input id="lngInput" type="number" step="0.000001" value="135.8074" />
              </label>
            </div>
            <p class="hint">也可以直接点击地图选择出发点。</p>
          </fieldset>

          <fieldset class="control-group">
            <legend>作品集合</legend>
            <label>
              榜单/主题
              <select id="presetSelect">
                <option value="kyoto">京都近郊巡礼样例</option>
                <option value="japan-classics">日本经典动画样例</option>
                <option value="custom">自定义 Bangumi ID</option>
              </select>
            </label>
            <div class="search-box">
              <label>
                Bangumi 动画搜索
                <input id="bangumiSearchInput" type="search" placeholder="输入作品名，如 吹响吧 上低音号" />
              </label>
              <button id="bangumiSearchBtn" type="button" class="secondary">搜索</button>
            </div>
            <div id="bangumiSearchResults" class="subject-results"></div>
            <div>
              <div class="section-label">已选作品</div>
              <div id="selectedSubjects" class="selected-subjects"></div>
            </div>
            <label>
              Bangumi subject ID，用逗号分隔
              <input id="subjectInput" value="115908, 2581, 126461" />
            </label>
            <p class="hint">搜索使用 Bangumi 公开 API；手动 ID 输入仍保留，便于导入榜单或外部映射结果。</p>
          </fieldset>

          <fieldset class="control-group">
            <legend>旅行参数</legend>
            <div class="grid-2">
              <label>
                天数
                <input id="daysInput" type="number" min="1" max="7" value="1" />
              </label>
              <label>
                每天最多地点
                <input id="stopsInput" type="number" min="2" max="12" value="6" />
              </label>
            </div>
            <label>
              搜索半径
              <select id="radiusSelect">
                <option value="5">5 km</option>
                <option value="15" selected>15 km</option>
                <option value="50">50 km</option>
                <option value="200">200 km</option>
                <option value="99999">不限</option>
              </select>
            </label>
          </fieldset>

          <div class="row actions">
            <button id="planBtn" type="button">生成路线</button>
            <button id="nearbyBtn" type="button" class="secondary">只看附近</button>
          </div>

          <div id="status" class="status" role="status">准备就绪</div>
        </aside>

        <section class="map-zone" aria-label="地图与结果">
          <div id="map"></div>
          <div class="results" aria-live="polite">
            <div class="tabs" role="tablist">
              <button id="routeTab" class="tab active" type="button">路线</button>
              <button id="nearbyTab" class="tab" type="button">附近圣地</button>
            </div>
            <div id="routePanel" class="result-panel"></div>
            <div id="nearbyPanel" class="result-panel hidden"></div>
          </div>
        </section>
      </section>
    </main>

    <template id="pointCardTemplate">
      <article class="point-card">
        <img class="point-image" alt="" loading="lazy" />
        <div class="point-body">
          <div class="point-topline"></div>
          <h3></h3>
          <p class="meta"></p>
          <div class="links"></div>
        </div>
      </article>
    </template>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
